{% extends "base.html" %}

{% block content %}
<section class="mx-auto max-w-3xl px-4 py-14 sm:px-6 lg:px-8">
    <div class="rounded-[2rem] border border-sand-200 bg-white/80 p-8 shadow-paper">
        <h1 class="font-serif text-4xl">Password updated</h1>
        <p class="mt-4 text-sm text-stone-600">Your password has been changed. You can sign in now.</p>
        <a href="{% url 'login' %}" class="mt-6 inline-flex rounded-full bg-moss-700 px-5 py-3 text-sm font-semibold text-white">Return to sign in</a>
    </div>
</section>
{% endblock %}
