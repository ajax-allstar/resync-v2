{% extends "base.html" %}

{% block content %}
<section class="mx-auto max-w-3xl px-4 py-14 sm:px-6 lg:px-8">
    <div class="rounded-[2rem] border border-sand-200 bg-white/80 p-8 shadow-paper">
        <h1 class="font-serif text-4xl">Reset your password</h1>
        <p class="mt-3 text-sm text-stone-600">We will send reset instructions to the email address linked to your account.</p>
        <form method="post" class="mt-6 space-y-4">
            {% csrf_token %}
            {{ form.email.label_tag }}
            {{ form.email }}
            <button class="rounded-full bg-moss-700 px-5 py-3 text-sm font-semibold text-white">Send reset link</button>
        </form>
    </div>
</section>
{% endblock %}
